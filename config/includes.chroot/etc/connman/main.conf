[General]

# This is the critical fix from the previous build. Without this,
# ConnMan tries to manage Docker's veth interfaces (which appear
# and disappear constantly as containers come up and down) and ends
# up thrashing the default route. Blacklisting these interface name
# patterns tells ConnMan to ignore them entirely.
NetworkInterfaceBlacklist=vmnet,vboxnet,virbr,ifb,ve-,vb-,docker,veth,br-,tun,tap

# Don't let DHCP servers change our hostname.
AllowHostnameUpdates=false

# Prefer wired ethernet. Fall back to WiFi if no cable.
PreferredTechnologies=ethernet,wifi
