# live-config reads files in /etc/live/config.conf.d/ at boot and
# uses them to drive the user-setup, hostname, and auto-login
# components. This is how we tell it "call the user nomad, put it
# in these groups, name the host nomad."
#
# The password is set separately in /lib/live/config/9999-nomad-extras
# because live-config has no native variable for that.

LIVE_USERNAME="nomad"
LIVE_USER_FULLNAME="Nomad"
LIVE_USER_DEFAULT_GROUPS="sudo docker audio video cdrom plugdev netdev dip floppy bluetooth"
LIVE_HOSTNAME="nomad"
