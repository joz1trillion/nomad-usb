# Drop-in SSH config overriding the defaults for Nomad.
# Goes in /etc/ssh/sshd_config.d/ which takes precedence over
# /etc/ssh/sshd_config.

# We ship with a known default password, so password auth must be on.
# Users should change the default password on first boot.
PasswordAuthentication yes
PubkeyAuthentication yes

# No root SSH — force people through the nomad user + sudo.
PermitRootLogin no

# Small QoL: don't waste a minute on reverse DNS that will fail offline.
UseDNS no

# Listen on all interfaces.
ListenAddress 0.0.0.0
